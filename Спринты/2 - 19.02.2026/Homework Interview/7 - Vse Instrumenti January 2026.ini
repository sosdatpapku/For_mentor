#Задача №1 (AB-тест)
Задизайни АБ по новому алгоритму ранжирования поисковой выдачи на сайте выбери защитные, главные и инфо метрики.

По этапам:
     1) Анализируем гипотезу - смотрим данные
     2) Определяем возможные подводные камни - сетевой эффект, эффект новизны, эффект сопротивления новому и возможная сезонность
     3) Определяем единицу рандомизации - пользователь / сессия
     4) Определяем метрики - целевые, прокси или сонаправленные метрики, защитные метрики.
        Главные метрики - конверсия в целевое действие (добавление в избранное или корзину), CTR.
        Информационные метрики - средняя позиция клика по выдаче, глубина прокрутки страницы.
        Защитные метрики - отказы (bounce rate) после поиска, доля повторных запросов в поиске, среднее время до первого клика по выдаче.
     5) Договариваемся о MDE, считаем необходимую выборку / длину теста при заданных стандартах для альфа и бета.
     6) Выбираем статистический критерий
     7) Запускаем тест - проверяем на баги, sample ratio missmatch, наличие эффектов из пункта 2
     8) Считаем результаты (смотрим p-value), делаем выводы о раскате / откате фичи или необходимости перезапуска теста (в случае, если полагаем что эффект есть, но он ниже MDE или в случае, если тест прошел с нарушением условий)

#Задача №2 (SQL)

select
    id,
    skill_id,
    salary
from employee
where salary <= 500000
order by skill_id

#Задача №3 (Pandas)

def actual_data(items):
    items['update_date'] = pd.to_datetime(items['update_date'])
    df = items.loc[items['update_date'] <= '2020-06-01']
    df_agg = df.groupby('item_id', as_index=False).agg(update_date=('update_date', 'max'))
    res = pd.merge(df, df_agg, on=['item_id', 'update_date'])

    return res[['item_id', 'name', 'price', 'update_date']]
